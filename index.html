<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mello Minds - Future of Therapy Practice Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Urbanist', 'sans-serif'],
            },
            colors: {
              mello: {
                bg: '#031c16', // Deep dark green from image
                yellow: '#ffe642', // Vibrant yellow from image
                dim: '#2f4f46', // Darker text color for "FUTURE OF"
                light: '#e6fffa', // Light mint/white
                pill: '#ffffff', // Pure white for pills
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #031c16;
        color: white;
      }
      /* Custom animation for the eyes */
      @keyframes blink {
        0%, 90%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); }
      }
      .animate-blink {
        animation: blink 4s infinite;
      }
      /* Float animation for speech bubble */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }
    </style>

}
</script>
